name: CI - PowerShell Quality Checks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  psscriptanalyzer:
    name: PSScriptAnalyzer
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Write-Host "Installing PSScriptAnalyzer..."
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -SkipPublisherCheck
          
          Write-Host "`nRunning PSScriptAnalyzer on all PowerShell files..."
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -ReportSummary -Settings PSGallery
          
          if ($results) {
            Write-Host "`n=== PSScriptAnalyzer Results ===" -ForegroundColor Yellow
            $results | Format-Table -AutoSize
            
            $errors = $results | Where-Object { $_.Severity -eq 'Error' }
            $warnings = $results | Where-Object { $_.Severity -eq 'Warning' }
            
            Write-Host "`nSummary:" -ForegroundColor Cyan
            Write-Host "  Errors: $($errors.Count)" -ForegroundColor $(if($errors.Count -eq 0){'Green'}else{'Red'})
            Write-Host "  Warnings: $($warnings.Count)" -ForegroundColor $(if($warnings.Count -eq 0){'Green'}else{'Yellow'})
            
            if ($errors.Count -gt 0) {
              Write-Host "`nFailing due to errors" -ForegroundColor Red
              exit 1
            }
          } else {
            Write-Host "`n✓ No issues found!" -ForegroundColor Green
          }

  test-powershell-51:
    name: Test on PowerShell 5.1
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Test PowerShell Scripts (5.1)
        shell: powershell
        run: |
          Write-Host "PowerShell Version: $($PSVersionTable.PSVersion)" -ForegroundColor Cyan
          Write-Host "Testing script syntax..."
          
          $failed = $false
          Get-ChildItem -Path . -Filter "*.ps1" -Recurse | ForEach-Object {
            Write-Host "Checking: $($_.FullName)"
            try {
              $null = [System.Management.Automation.PSParser]::Tokenize((Get-Content $_.FullName -Raw), [ref]$null)
              Write-Host "  ✓ OK" -ForegroundColor Green
            } catch {
              Write-Host "  ✗ SYNTAX ERROR: $_" -ForegroundColor Red
              $failed = $true
            }
          }
          
          if ($failed) {
            Write-Host "`nSyntax check failed!" -ForegroundColor Red
            exit 1
          } else {
            Write-Host "`n✓ All scripts have valid syntax!" -ForegroundColor Green
          }

  test-powershell-7:
    name: Test on PowerShell 7.4
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Test PowerShell Scripts (7.4)
        shell: pwsh
        run: |
          Write-Host "PowerShell Version: $($PSVersionTable.PSVersion)" -ForegroundColor Cyan
          Write-Host "Testing script syntax..."
          
          $failed = $false
          Get-ChildItem -Path . -Filter "*.ps1" -Recurse | ForEach-Object {
            Write-Host "Checking: $($_.Name)"
            try {
              $null = [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$null, [ref]$null)
              Write-Host "  ✓ OK" -ForegroundColor Green
            } catch {
              Write-Host "  ✗ SYNTAX ERROR: $_" -ForegroundColor Red
              $failed = $true
            }
          }
          
          if ($failed) {
            Write-Host "`nSyntax check failed!" -ForegroundColor Red
            exit 1
          } else {
            Write-Host "`n✓ All scripts have valid syntax!" -ForegroundColor Green
          }

  validate-structure:
    name: Validate Project Structure
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Check Required Files
        shell: pwsh
        run: |
          Write-Host "Checking project structure..." -ForegroundColor Cyan
          
          $required = @(
            "README.md",
            "LICENSE",
            "CHANGELOG.md",
            "NoIDPrivacy-Interactive.ps1",
            "Core/Framework.ps1",
            "Modules",
            "Tools"
          )
          
          $missing = @()
          foreach ($item in $required) {
            if (Test-Path $item) {
              Write-Host "✓ $item" -ForegroundColor Green
            } else {
              Write-Host "✗ $item (MISSING)" -ForegroundColor Red
              $missing += $item
            }
          }
          
          if ($missing.Count -gt 0) {
            Write-Host "`nMissing required files/folders!" -ForegroundColor Red
            exit 1
          } else {
            Write-Host "`n✓ All required files present!" -ForegroundColor Green
          }
      
      - name: Check Module Structure
        shell: pwsh
        run: |
          Write-Host "`nValidating module structure..." -ForegroundColor Cyan
          
          $modules = @(
            "SecurityBaseline",
            "ASR",
            "DNS",
            "Privacy",
            "AntiAI",
            "EdgeHardening",
            "AdvancedSecurity"
          )
          
          $failed = $false
          foreach ($module in $modules) {
            $modulePath = "Modules/$module"
            if (Test-Path $modulePath) {
              Write-Host "✓ Module: $module" -ForegroundColor Green
              
              # Check for required module files
              $moduleFile = "$modulePath/$module.psm1"
              $manifestFile = "$modulePath/$module.psd1"
              
              if (Test-Path $moduleFile) {
                Write-Host "  ✓ $module.psm1" -ForegroundColor Green
              } else {
                Write-Host "  ✗ $module.psm1 (MISSING)" -ForegroundColor Red
                $failed = $true
              }
              
              if (Test-Path $manifestFile) {
                Write-Host "  ✓ $module.psd1" -ForegroundColor Green
              } else {
                Write-Host "  ✗ $module.psd1 (MISSING)" -ForegroundColor Red
                $failed = $true
              }
            } else {
              Write-Host "✗ Module: $module (MISSING)" -ForegroundColor Red
              $failed = $true
            }
          }
          
          if ($failed) {
            Write-Host "`nModule structure validation failed!" -ForegroundColor Red
            exit 1
          } else {
            Write-Host "`n✓ All modules are correctly structured!" -ForegroundColor Green
          }
