        with:
          files: './TestResults.xml'
          check_name: 'Test Results (PS 7.4)'
  
  analyze:
    name: PSScriptAnalyzer
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -SkipPublisherCheck
          Import-Module PSScriptAnalyzer
      
      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $settingsPath = './.pssa-settings.psd1'
          
          # Check if any PowerShell files exist
          $psFiles = Get-ChildItem -Path . -Include '*.ps1','*.psm1','*.psd1' -Recurse -ErrorAction SilentlyContinue
          if (!$psFiles) {
            Write-Host "No PowerShell files found - skipping analysis" -ForegroundColor Yellow
            exit 0
          }
          
          Write-Host "Analyzing $($psFiles.Count) PowerShell file(s)..." -ForegroundColor Cyan
          
          if (Test-Path $settingsPath) {
            Write-Host "Using settings file: $settingsPath" -ForegroundColor Cyan
            $results = Invoke-ScriptAnalyzer -Path . -Recurse -Settings $settingsPath
          } else {
            Write-Host "No settings file found, using default rules" -ForegroundColor Yellow
            $results = Invoke-ScriptAnalyzer -Path . -Recurse
          }
          
          if ($results) {
            Write-Host ""
            Write-Host "PSScriptAnalyzer Results:" -ForegroundColor Cyan
            $results | Format-Table -AutoSize
            
            $errors = @($results | Where-Object Severity -eq 'Error')
            $warnings = @($results | Where-Object Severity -eq 'Warning')
            $info = @($results | Where-Object Severity -eq 'Information')
            
            Write-Host ""
            Write-Host "Summary:" -ForegroundColor Cyan
            Write-Host "  Errors: $($errors.Count)" -ForegroundColor $(if ($errors.Count -gt 0) { 'Red' } else { 'Green' })
            Write-Host "  Warnings: $($warnings.Count)" -ForegroundColor Yellow
            Write-Host "  Information: $($info.Count)" -ForegroundColor Gray
            
            if ($errors.Count -gt 0) {
              Write-Host ""
              Write-Host "FAILED: Build fails due to $($errors.Count) PSScriptAnalyzer error(s)!" -ForegroundColor Red
              exit 1
            }
            
            if ($warnings.Count -gt 0) {
              Write-Host ""
              Write-Host "WARNING: $($warnings.Count) warning(s) found but build continues" -ForegroundColor Yellow
            }
          } else {
            Write-Host ""
            Write-Host "SUCCESS: No issues found! ✓" -ForegroundColor Green
          }
      
      - name: Upload PSSA Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pssa-results
          path: |
            **/*.sarif
          retention-days: 30
