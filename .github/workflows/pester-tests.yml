name: Pester Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Security: Explicit permissions (Principle of Least Privilege)
permissions:
  contents: read          # Required for checkout

jobs:
  test:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Pester
      shell: pwsh
      run: |
        Install-Module -Name Pester -Force -SkipPublisherCheck -Scope CurrentUser
        Import-Module Pester

    - name: Run Unit Tests
      shell: pwsh
      run: |
        $config = New-PesterConfiguration
        $config.Run.Path = "Tests/Unit"
        $config.Run.PassThru = $true
        $config.Output.Verbosity = 'Detailed'
        $config.TestResult.Enabled = $true
        $config.TestResult.OutputPath = "TestResults-Unit.xml"
        $config.TestResult.OutputFormat = 'NUnitXml'

        $results = Invoke-Pester -Configuration $config

        if ($results.FailedCount -gt 0) {
          Write-Error "Unit tests failed: $($results.FailedCount) failures"
          exit 1
        }

    - name: Run Integration Tests (DryRun only)
      shell: pwsh
      run: |
        $config = New-PesterConfiguration
        $config.Run.Path = "Tests/Integration"
        $config.Run.PassThru = $true
        $config.Output.Verbosity = 'Detailed'
        $config.TestResult.Enabled = $true
        $config.TestResult.OutputPath = "TestResults-Integration.xml"
        $config.TestResult.OutputFormat = 'NUnitXml'

        $results = Invoke-Pester -Configuration $config

        if ($results.FailedCount -gt 0) {
          Write-Error "Integration tests failed: $($results.FailedCount) failures"
          exit 1
        }

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: TestResults-*.xml

    - name: Publish Test Summary
      shell: pwsh
      if: always()
      run: |
        "## Pester Test Results`n" | Out-File -Append -FilePath $env:GITHUB_STEP_SUMMARY
        $files = Get-ChildItem TestResults-*.xml -ErrorAction SilentlyContinue
        if (-not $files) {
          "_No test result files found._" | Out-File -Append -FilePath $env:GITHUB_STEP_SUMMARY
          return
        }
        foreach ($f in $files) {
          [xml]$xml = Get-Content $f.FullName
          $r = $xml.'test-results'
          $icon = if ([int]$r.failures -gt 0 -or [int]$r.errors -gt 0) { ':x:' } else { ':white_check_mark:' }
          "- $icon **$($f.Name)**: $($r.total) total, $($r.failures) failures, $($r.errors) errors, $($r.'not-run') skipped" | Out-File -Append -FilePath $env:GITHUB_STEP_SUMMARY
        }
